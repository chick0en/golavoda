<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingo Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Lingo Game</h1>
  <div id="legend">
    <div class="legend-item"><div class="color-box green"></div> Correct letter & position</div>
    <div class="legend-item"><div class="color-box yellow"></div> Correct letter, wrong position</div>
    <div class="legend-item"><div class="color-box gray"></div> Incorrect letter</div>
  </div>
  <div id="game-board"></div>
  <div id="input-box">
    <input type="text" id="guess-input" maxlength="5" placeholder="Guess word" />
    <button id="submit-btn">Submit</button>
    <button id="ai-btn">Let AI Play</button>
    <button id="reset-btn">Reset</button>
  </div>
  <div id="reveal-word"></div>
  <script src="script.js"></script>
</body>
</html>
