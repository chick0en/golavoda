<!DOCTYPE html>
<html>
<head>
    <title>Lingo Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Lingo Game</h1>
    <p>Guess the 5-letter word!</p>

    <div id="gameInfo">
    <p>Attempts Left: <span id="attemptsLeft">6</span></p>

    <button id="hintBtn">
        Hint
    </button>
    
    </div>

    <div id="legend">
    <div class="legend-item">
        <span class="legend-box grey"></span>
        Wrong letter
    </div>

    <div class="legend-item">
        <span class="legend-box yellow"></span>
        Right letter, wrong position
    </div>

    <div class="legend-item">
        <span class="legend-box green"></span>
        Right letter, right position
    </div>
</div>

    <div id="board"></div>

    <script src="script.js"></script>

</body>
</html>
